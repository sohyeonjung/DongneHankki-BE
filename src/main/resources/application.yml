spring:
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://localhost:3306/dongnehankki?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    org.hibernate.sql: debug

server:
  url: ${SERVER_URL}

jwt:
  secret : ${SERVER_SECRET}
  access-token-expiration-minutes: ${SERVER_EXPIRATION}
  refresh-token-expiration-minutes: ${REFRESH_TOKEN_EXPIRATION}

openapi:
  gg:
    key: ${GG_OPEN_API_KEY}
    url: https://openapi.gg.go.kr/RegionMnyFacltStus
    sigun-nm: 광명시

coolsms:
  api:
    key: ${COOLSMS_API_KEY}
    secret: ${COOLSMS_SECRET_KEY}
    number: ${COOLSMS_SENDER_NUMBER}
---
spring:
  config:
    activate:
      on-profile: local
    import: optional:application-local.yml