name: CI/CD with Docker Registry

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/dongnehankki-be # Docker Hub 사용자이름/이미지이름

jobs:
  build-and-push-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Build with Gradle to create JAR
        run: ./gradlew build -stacktrace

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest

  deploy-to-server:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push-image
    if: github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            set -e
            
            # 1. Docker Hub에서 최신 이미지 가져오기
            docker pull ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            
            # 2. 기존 컨테이너가 있으면 중지 및 삭제
            docker stop dongnehankki || true
            docker rm dongnehankki || true
            
            # 3. 새 이미지로 컨테이너 실행
            docker run -d \
            --name dongnehankki \
            --network attendance-deploy_attendance-net \
            --label traefik.enable=true \
            --label 'traefik.http.routers.dongnehankki.rule=Host(`dh.porogramr.site`)' \
            --label traefik.http.routers.dongnehankki.entrypoints=websecure \
            --label traefik.http.routers.dongnehankki.tls=true \
            --label traefik.http.routers.dongnehankki.tls.certresolver=letsencrypt \
            --label traefik.http.services.dongnehankki.loadbalancer.server.port=8083 \
            -e TZ=Asia/Seoul \
            -e SPRING_PROFILES_ACTIVE=prod \
            -p 8083:8083 \
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

            # 4. 사용하지 않는 이전 Docker 이미지 정리 (선택 사항)
            docker image prune -af

            echo "Deployment successful!"
