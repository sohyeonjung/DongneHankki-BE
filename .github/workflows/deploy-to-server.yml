name: KernelLabs CICD

on:
  push:
# branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]
jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      #      - name: Run Tests
      #        run: ./gradlew test

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Define repository path and branch
            REPO_DIR="/home/${{ secrets.SERVER_USER }}/DongneHankki-BE" # Adjust path as needed
            BRANCH="develop" # Or whatever branch is being deployed

            # 1. Clone or pull the latest code
            if [ -d "$REPO_DIR" ]; then
              echo "Repository already exists. Pulling latest changes..."
              cd "$REPO_DIR"
              git pull origin "$BRANCH"
            else
              echo "Cloning repository..."
              git clone https://github.com/${{ github.repository }}.git "$REPO_DIR"
              cd "$REPO_DIR"
              git checkout "$BRANCH"
            fi

            # 2. Create application-prod.yml on the server
            mkdir -p src/main/resources
            echo "${{ secrets.PROPERTIES_PROD }}" > src/main/resources/application-prod.yml

            # 3. Build Docker Image on the server
            docker build -t dongnehankki:latest .

            # 4. Stop, remove, and run the Docker container
            docker stop dongnehankki || true
            docker rm dongnehankki || true
            docker run -d \
            --name dongnehankki \
            --network attendance-deploy_attendance-net  \
            --label traefik.enable=true \
            --label 'traefik.http.routers.dongnehankki.rule=Host(`dh.porogramr.site`)' \
            --label traefik.http.routers.dongnehankki.entrypoints=websecure \
            --label traefik.http.routers.dongnehankki.tls=true \
            --label traefik.http.routers.dongnehankki.tls.certresolver=letsencrypt \
            --label traefik.http.services.dongnehankki.loadbalancer.server.port=8083 \
            -e TZ=Asia/Seoul \
            -e SPRING_PROFILES_ACTIVE=prod \
            dongnehankki:latest

